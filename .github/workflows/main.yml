name: Best Windows RDP Fixed

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: System Info
        run: systeminfo

      - name: Install Tailscale
        run: choco install tailscale -y

      - name: Connect Tailscale
        shell: powershell
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey "${{ secrets.TAILSCALE_AUTHKEY }}"

      - name: Enable Remote Desktop
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Create Admin User
        run: |
          net user CloudUser Pass@123456 /add
          net localgroup administrators CloudUser /add

      - name: Show Login Info
        shell: powershell
        run: |
          Write-Host "================================="
          Write-Host "IP ADDRESS:"
          & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Host ""
          Write-Host "USERNAME: CloudUser"
          Write-Host "PASSWORD: Pass@123456"
          Write-Host "================================="

      - name: Keep Alive
        shell: powershell
        run: |
          Start-Sleep -Seconds 21600
