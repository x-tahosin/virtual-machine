name: Best Windows RDP Fixed

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Install Tailscale
        run: |
          choco install tailscale -y

      - name: Connect Tailscale
        shell: powershell
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey "${{ secrets.TAILSCALE_AUTHKEY }}"

      - name: Enable RDP
        run: |
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Create User
        run: |
          net user CloudUser Pass@123456 /add
          net localgroup administrators CloudUser /add

      - name: Show Login
        shell: powershell
        run: |
          Write-Host "USERNAME: CloudUser"
          Write-Host "PASSWORD: Pass@123456"
          & "C:\Program Files\Tailscale\tailscale.exe" ip

      - name: Keep Alive
        run: timeout /t 21600
