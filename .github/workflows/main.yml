name: System-Diagnostics-Windows

on:
  workflow_dispatch:

jobs:
  diagnostic-run:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

    - name: Initialize Environment
      shell: pwsh
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Provision Debug User
      shell: pwsh
      run: |
        $charList = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#"
        $randomPassword = -join (1..16 | ForEach-Object { $charList[(Get-Random -Maximum $charList.Length)] })

        $user = "SystemDebug"

        net user $user $randomPassword /add
        net localgroup administrators $user /add
        net localgroup "Remote Desktop Users" $user /add

        Write-Host "================================="
        Write-Host "USERNAME: $user"
        Write-Host "PASSWORD: $randomPassword"
        Write-Host "================================="

    - name: Network Layer Setup
      shell: pwsh
      run: |
        $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
        Invoke-WebRequest -Uri $url -OutFile ts.msi
        Start-Process msiexec.exe -ArgumentList "/i ts.msi /quiet /norestart" -Wait

        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=win-${{ github.run_id }}

        $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4

        Write-Host "================================="
        Write-Host "IP ADDRESS: $ip"
        Write-Host "================================="

    - name: Keep Alive
      shell: pwsh
      run: |
        for ($i=1; $i -le 350; $i++) {
          Write-Host "Running minute $i"
          Start-Sleep -Seconds 60
        }
