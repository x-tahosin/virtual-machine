name: Best Windows RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: System Info
        run: |
          systeminfo

      - name: Install Tailscale
        run: |
          choco install tailscale -y

      - name: Connect Tailscale
        run: |
          tailscale up --authkey ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Enable RDP
        run: |
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Create Admin User
        run: |
          net user CloudUser Pass@123456 /add
          net localgroup administrators CloudUser /add

      - name: Show Login Info
        shell: powershell
        run: |
          Write-Host "================================="
          Write-Host "USERNAME: CloudUser"
          Write-Host "PASSWORD: Pass@123456"
          tailscale ip
          Write-Host "================================="

      - name: Keep Alive
        run: |
          timeout /t 21600
